<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">
    <title>QR Generator</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/images/favicon-16.png" sizes="16x16" type="image/png">
    <link rel="icon" href="assets/images/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="header">
        <h1>QR Code Generator</h1>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
            <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
        </button>
    </header>
    <div class="container">
        <div class="main-content">
            <div class="qr-section">
                <div class="qr-card">
                    <div class="qr-preview" id="qr-preview">
                        <div id="qr-container"></div>
                        <div class="qr-placeholder" id="qr-placeholder">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="3" width="7" height="7" rx="1"/>
                                <rect x="3" y="14" width="7" height="7" rx="1"/>
                                <rect x="14" y="14" width="3" height="3" rx="0.5"/>
                                <rect x="18" y="14" width="3" height="3" rx="0.5"/>
                                <rect x="14" y="18" width="3" height="3" rx="0.5"/>
                                <rect x="18" y="18" width="3" height="3" rx="0.5"/>
                            </svg>
                            <span>Preview</span>
                        </div>
                    </div>
                    <button class="download-btn" id="download-btn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download PNG
                    </button>
                </div>
            </div>

            <div class="form-section">
                <div class="type-selector">
                    <button class="type-btn active" data-type="url">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        URL
                    </button>
                    <button class="type-btn" data-type="text">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 7 4 4 20 4 20 7"/>
                            <line x1="9" y1="20" x2="15" y2="20"/>
                            <line x1="12" y1="4" x2="12" y2="20"/>
                        </svg>
                        Text
                    </button>
                    <button class="type-btn" data-type="wifi">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                            <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                            <line x1="12" y1="20" x2="12.01" y2="20"/>
                        </svg>
                        Wi-Fi
                    </button>
                    <button class="type-btn" data-type="vcard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Contact
                    </button>
                </div>

                <div class="forms-container">
                    <!-- URL Form -->
                    <form class="qr-form active" id="form-url" data-type="url">
                        <div class="input-group">
                            <input type="url" id="url-content" placeholder="https://example.com" required>
                        </div>
                    </form>

                    <!-- Text Form -->
                    <form class="qr-form" id="form-text" data-type="text">
                        <div class="input-group">
                            <textarea id="text-content" placeholder="Enter your text here..." rows="4" required></textarea>
                        </div>
                    </form>

                    <!-- Wi-Fi Form -->
                    <form class="qr-form" id="form-wifi" data-type="wifi">
                        <div class="input-group">
                            <input type="text" id="wifi-ssid" placeholder="Network name (SSID)" required>
                        </div>
                        <div class="input-group password-field">
                            <input type="password" id="wifi-password" placeholder="Password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password">
                                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <div class="input-group">
                            <select id="wifi-security">
                                <option value="WPA">WPA/WPA2/WPA3</option>
                                <option value="WPA3">WPA3</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">None</option>
                            </select>
                        </div>
                    </form>

                    <!-- vCard Form -->
                    <form class="qr-form" id="form-vcard" data-type="vcard">
                        <div class="input-row">
                            <div class="input-group">
                                <input type="text" id="vcard-firstname" placeholder="First name" required>
                            </div>
                            <div class="input-group">
                                <input type="text" id="vcard-lastname" placeholder="Last name" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <input type="tel" id="vcard-phone" placeholder="Phone">
                        </div>
                        <div class="input-group">
                            <input type="email" id="vcard-email" placeholder="Email">
                        </div>
                        <div class="input-group">
                            <input type="text" id="vcard-org" placeholder="Company">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
